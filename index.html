<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Toplama Oyunu</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1b33;
      --text:#e5e7eb;
      --muted:rgba(229,231,235,.75);
      --border:rgba(255,255,255,.10);
      --btn:#1f2937;       /* sade */
      --btnText:#e5e7eb;
      --ok:#22c55e;
      --bad:#ef4444;
      --accent:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      color:var(--text);
      font-family: Arial, sans-serif;
    }
    .wrap{width:min(820px, 94vw); padding:18px;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
      box-shadow:0 14px 34px rgba(0,0,0,.35);
    }
    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }
    .pill{
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      font-size:15px;
    }
    .pill b{font-size:18px}
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    select{
      background:#0b1220;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      font-size:15px;
      outline:none;
    }
    .qbox{
      margin:12px 0 14px;
      border-radius:18px;
      background:#0b1220;
      border:1px solid var(--border);
      padding:18px 14px;
      text-align:center;
    }
    .question{
      font-weight:800;
      letter-spacing:.5px;
      font-size: clamp(44px, 8vw, 84px); /* kocaman */
      line-height:1.05;
      margin:0;
    }
    .sub{
      margin:10px 0 0;
      font-size:14px;
      color:var(--muted);
    }
    .answers{
      display:grid;
      gap:12px;
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width:640px){
      .answers{grid-template-columns:1fr;}
    }
    .ans{
      width:100%;
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px 12px;
      background:var(--btn);     /* sade buton */
      color:var(--btnText);
      font-weight:900;
      cursor:pointer;
      font-size: clamp(28px, 6vw, 52px); /* kocaman rakam */
      line-height:1;
      transition: transform .05s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .ans:active{transform:scale(.99)}
    .ans[disabled]{opacity:.95; cursor:default}
    .ans.ok{background:rgba(34,197,94,.22); border-color:rgba(34,197,94,.55)}
    .ans.bad{background:rgba(239,68,68,.22); border-color:rgba(239,68,68,.55)}
    .ans.color1{background:rgba(245,158,11,.20)}
    .ans.color2{background:rgba(59,130,246,.18)}
    .ans.color3{background:rgba(236,72,153,.18)}
    .bottom{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
    }
    .btn{
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#0b1220;
      color:var(--text);
      font-weight:800;
      cursor:pointer;
      font-size:15px;
    }
    .btn.primary{
      background:rgba(245,158,11,.18);
      border-color:rgba(245,158,11,.45);
    }
    .msg{
      font-size:15px;
      color:var(--muted);
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
      flex: 1 1 auto;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div class="pill">Puan: <b id="score">0</b></div>

        <div class="controls">
          <select id="group">
            <option value="1">1. Grup (0–5 + 0–5)</option>
            <option value="2">2. Grup (0–9 + 0–9)</option>
            <option value="3">3. Grup (0–20 + 0–10)</option>
          </select>
          <button class="btn primary" id="newBtn">Yeni Soru</button>
          <button class="btn" id="resetBtn">Sıfırla</button>
        </div>
      </div>

      <div class="qbox">
        <p class="question" id="question">—</p>
        <p class="sub" id="hint">Yeni Soru’ya bas.</p>
      </div>

      <div class="answers">
        <button class="ans color1" id="a1">-</button>
        <button class="ans color2" id="a2">-</button>
        <button class="ans color3" id="a3">-</button>
      </div>

      <div class="bottom">
        <div class="msg" id="msg">Cevabı seç.</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const els = {
    score: document.getElementById('score'),
    group: document.getElementById('group'),
    question: document.getElementById('question'),
    hint: document.getElementById('hint'),
    msg: document.getElementById('msg'),
    newBtn: document.getElementById('newBtn'),
    resetBtn: document.getElementById('resetBtn'),
    a1: document.getElementById('a1'),
    a2: document.getElementById('a2'),
    a3: document.getElementById('a3'),
  };

  const LS_KEY = "toplama_oyunu_buton_v1";

  let state = load() ?? {
    score: 0,
    group: "1",
    a: null,
    b: null,
    correct: null,
    locked: false
  };

  function load(){ try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch { return null; } }
  function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

  function rngInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
  function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function limitsByGroup(g){
    if (g === "1") return { aMax: 5,  bMax: 5  };
    if (g === "2") return { aMax: 9,  bMax: 9  };
    return             { aMax: 20, bMax: 10 };
  }

  function setButtonsEnabled(on){
    [els.a1, els.a2, els.a3].forEach(b => b.disabled = !on);
  }

  function clearButtonStates(){
    [els.a1, els.a2, els.a3].forEach(b => {
      b.classList.remove('ok','bad');
    });
  }

  function render(){
    els.score.textContent = state.score;
    els.group.value = state.group;

    if (state.a === null){
      els.question.textContent = "—";
      els.hint.textContent = "Yeni Soru’ya bas.";
      [els.a1, els.a2, els.a3].forEach(b => b.textContent = "-");
      setButtonsEnabled(false);
      clearButtonStates();
      return;
    }

    els.question.textContent = `${state.a} + ${state.b} = ?`;
    els.hint.textContent = "Doğru cevabı seç.";

    setButtonsEnabled(!state.locked);
  }

  function buildChoices(correct){
    // 3 seçenek: 1 doğru + 2 yanlış (yakın sayılar)
    const wrong1 = correct + rngInt(-3, 3) || (correct + 1);
    let w1 = wrong1;
    if (w1 === correct) w1 = correct + 2;

    let w2 = correct + rngInt(-5, 5);
    if (w2 === correct || w2 === w1) w2 = correct + 4;

    // Negatif olmasın
    if (w1 < 0) w1 = 0;
    if (w2 < 0) w2 = 0;

    const choices = shuffle([correct, w1, w2]);
    return choices;
  }

  function newQuestion(){
    state.locked = false;
    clearButtonStates();

    const { aMax, bMax } = limitsByGroup(state.group);
    state.a = rngInt(0, aMax);
    state.b = rngInt(0, bMax);
    state.correct = state.a + state.b;

    const [c1, c2, c3] = buildChoices(state.correct);
    els.a1.textContent = c1;
    els.a2.textContent = c2;
    els.a3.textContent = c3;

    setButtonsEnabled(true);
    els.msg.textContent = "Cevabı seç.";
    save();
    render();
  }

  function onPick(btn){
    if (state.locked || state.a === null) return;

    state.locked = true;
    setButtonsEnabled(false);

    const picked = parseInt(btn.textContent, 10);
    const correct = state.correct;

    if (picked === correct){
      state.score += 1;
      btn.classList.add('ok');
      els.msg.textContent = "Doğru! ✅";
    } else {
      btn.classList.add('bad');
      els.msg.textContent = "Yanlış. ❌";
      // Doğru olanı yeşil göster
      [els.a1, els.a2, els.a3].forEach(b => {
        if (parseInt(b.textContent, 10) === correct) b.classList.add('ok');
      });
    }

    save();
    render();

    // 1.2 sn sonra yeni soru
    setTimeout(() => {
      state.a = null; state.b = null; state.correct = null; state.locked = false;
      save();
      newQuestion();
    }, 1200);
  }

  function resetAll(){
    state.score = 0;
    state.a = null; state.b = null; state.correct = null; state.locked = false;
    save();
    els.msg.textContent = "Sıfırlandı. Yeni Soru’ya bas.";
    render();
  }

  // events
  els.newBtn.addEventListener('click', newQuestion);
  els.resetBtn.addEventListener('click', resetAll);
  els.group.addEventListener('change', () => {
    state.group = els.group.value;
    state.a = null; state.b = null; state.correct = null; state.locked = false;
    save();
    els.msg.textContent = "Grup seçildi. Yeni Soru’ya bas.";
    render();
  });

  [els.a1, els.a2, els.a3].forEach(b => b.addEventListener('click', () => onPick(b)));

  // init
  render();
})();
</script>
</body>
</html>
